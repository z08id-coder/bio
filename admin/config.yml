backend:
  name: github
  repo: z08id-coder/bio
  branch: main
  # السطرين الجايين هم "مفتاح الحل" لمشكلة الـ Not Found
  base_url: https://z08id-coder.github.io/bio/
  auth_endpoint: https://static-cms-auth.vercel.app/api/auth

media_folder: "images"
public_folder: "images"

collections:
  - name: "posts"
    label: "البوستات"
    folder: "_posts"
    create: true
    delete: true
    # الترتيب التلقائي بناءً على وقت النشر
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{slug}}"
    fields:
      - {label: "اسم الشخص", name: "title", widget: "string"}
      
      # التاريخ مخفي ويؤخذ تلقائياً
      - {
          label: "التاريخ", 
          name: "date", 
          widget: "hidden", 
          default: "{{now}}"
        }

      # حقل الأفاتار
      - {label: "الأفاتار (صورة الشخص)", name: "avatar", widget: "image", required: true}
      
      # حقل صورة المنشور (اختياري)
      - {label: "صورة البوست (اختياري)", name: "image", widget: "image", required: false}
      
      - {label: "نص المنشور", name: "body", widget: "markdown"}
