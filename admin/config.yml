backend:
  name: git-gateway
  repo: z08id-coder/bio
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "posts"
    label: "البوستات"
    folder: "_posts"
    create: true
    delete: true
    # التعديل هنا لضمان تسمية الملفات بالتاريخ والوقت بدقة للترتيب التلقائي
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{slug}}"
    fields:
      - {label: "اسم الشخص", name: "title", widget: "string"}
      
      # التعديل الجوهري: التاريخ صار مخفي (hidden) وبياخد الوقت الحالي تلقائياً
      - {
          label: "التاريخ", 
          name: "date", 
          widget: "hidden", 
          default: "{{now}}"
        }

      # حقل الأفاتار (الصورة الدائرية اللي جنب الاسم)
      - {label: "الأفاتار (صورة الشخص)", name: "avatar", widget: "image", required: true}
      
      # حقل صورة المنشور (اختياري)
      - {label: "صورة البوست (اختياري)", name: "image", widget: "image", required: false}
      
      - {label: "نص المنشور", name: "body", widget: "markdown"}
