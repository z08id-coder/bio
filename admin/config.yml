backend:
  name: git-gateway
  repo: z08id-coder/bio
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "posts"
    label: "البوستات"
    folder: "_posts"
    create: true
    fields:
      - {label: "اسم الشخص", name: "title", widget: "string"}
      - {
          label: "التاريخ", 
          name: "date", 
          widget: "datetime", 
          date_format: "DD/MM/YYYY", 
          time_format: "hh:mm A", 
          format: "YYYY-MM-DD hh:mm A",
          picker_utc: false
        }
      - {label: "الصورة الشخصية", name: "image", widget: "image"}
      - {label: "نص المنشور", name: "body", widget: "markdown"}
