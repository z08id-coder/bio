<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaid & Friends</title>
    <style>
        body {
            background-color: #0f1115;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-top: 50px; font-size: 2.5rem; }
        .subtitle { color: #888; margin-bottom: 40px; }
        
        /* حاوية البوستات */
        #posts-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .post-card {
            background: #1a1d23;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .post-card:hover { transform: translateY(-5px); border-color: #555; }
        .post-card h3 { margin-top: 0; color: #4facfe; }
        .post-card p { line-height: 1.6; color: #ccc; }
        .post-date { font-size: 0.8rem; color: #666; }

        /* مشغل الصوت الأسفل */
        .audio-player {
            position: fixed;
            bottom: 20px;
            background: rgba(30, 33, 40, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <h1>Zaid & Friends</h1>
    <p class="subtitle">from zaid 2026 ©</p>

    <div id="posts-container">
        <p style="text-align:center;">جاري تحميل الذكريات...</p>
    </div>

    <div class="audio-player">
        <span id="status">🔇 انقر لتشغيل الـ Beat</span>
        <audio id="myBeat" loop>
            <source src="beat.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const repoOwner = 'z08id-coder';
        const repoName = 'bio';
        const postsContainer = document.getElementById('posts-container');
        const audio = document.getElementById('myBeat');
        const statusText = document.getElementById('status');

        // 1. وظيفة تشغيل الصوت
        function enableAudio() {
            audio.play().then(() => {
                statusText.innerText = "🎵 Zaid & Friends Beat - Playing";
                document.removeEventListener('click', enableAudio);
            }).catch(err => console.log("Waiting for interaction..."));
        }
        document.addEventListener('click', enableAudio);

        // 2. وظيفة جلب البوستات من GitHub API
        async function fetchPosts() {
            try {
                // جلب قائمة الملفات من مجلد _posts
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/_posts`);
                const files = await response.json();

                if (!Array.isArray(files)) throw new Error("No files found");

                postsContainer.innerHTML = ''; // تفريغ الحاوية

                // فلترة ملفات الـ JSON فقط
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                for (const file of jsonFiles) {
                    const postRes = await fetch(file.download_url);
                    const postData = await postRes.json();
                    
                    displayPost(postData);
                }
            } catch (error) {
                console.error(error);
                postsContainer.innerHTML = "<p style='text-align:center;'>تأكد من وجود ملفات .json داخل مجلد _posts</p>";
            }
        }

        function displayPost(data) {
            const postHTML = `
                <div class="post-card">
                    <h3>${data.author || 'Zaid'}</h3>
                    <p>${data.body}</p>
                    <div class="post-date">${data.date || ''}</div>
                </div>
            `;
            postsContainer.innerHTML += postHTML;
        }

        fetchPosts();
    </script>
</body>
</html>
