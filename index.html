<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Zaid & Friends</title>
    <style>
        /* الستايل الأصلي اللي بدك اياه */
        body {
            background-color: #0f1115;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        .footer-text { color: #555; margin-bottom: 40px; }

        /* حاوية البوستات - التأكد أنها ظاهرة */
        #feed {
            width: 90%;
            max-width: 500px;
            z-index: 1; /* عشان تكون فوق أي خلفية */
        }

        .post {
            background: #161a1f;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #222;
        }

        /* مشغل الصوت - وضعته عجنب تحت عشان ما يغطي البوستات */
        .player-container {
            position: fixed;
            bottom: 20px;
            left: 20px; /* عجنب */
            background: #1e2128;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>Zaid & Friends</h1>
    <p class="footer-text">from zaid 2026 ©</p>

    <div id="feed">
        <p style="text-align:center; color:#444;">جاري جلب المنشورات...</p>
    </div>

    <div class="player-container" id="player">
        <span id="music-status">🔈 انقر لتشغيل Beat</span>
        <audio id="bg-music" loop src="beat.mp3"></audio>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const audio = document.getElementById('bg-music');
        const status = document.getElementById('music-status');

        // 1. تشغيل الصوت (بدون ما يعطل باقي الكود)
        document.addEventListener('click', () => {
            audio.play().then(() => {
                status.innerText = "🎵 Playing: Zaid & Friends Beat";
            }).catch(() => {});
        }, { once: true }); // يتنفذ مرة واحدة فقط

        // 2. جلب البوستات (الكود اللي كان واقف)
        async function loadPosts() {
            try {
                // جلب قائمة الملفات من مجلد _posts
                const response = await fetch('https://api.github.com/repos/z08id-coder/bio/contents/_posts');
                const files = await response.json();
                
                feed.innerHTML = ''; // تنظيف الحاوية

                for (let file of files) {
                    if (file.name.endsWith('.json')) {
                        const postData = await fetch(file.download_url).then(r => r.json());
                        const postDiv = document.createElement('div');
                        postDiv.className = 'post';
                        postDiv.innerHTML = `
                            <p><strong>${postData.author}</strong></p>
                            <p>${postData.body}</p>
                            <small style="color:#444">${postData.date}</small>
                        `;
                        feed.appendChild(postDiv);
                    }
                }
            } catch (e) {
                feed.innerHTML = "<p>تأكد من وجود ملفات JSON في مجلد _posts</p>";
            }
        }

        loadPosts();
    </script>
</body>
</html>
