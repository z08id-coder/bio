<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KPM9RH2MP5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KPM9RH2MP5');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaid & Friends</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 100px; }
        .container { max-width: 500px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        header h1 { font-size: 1.8rem; color: #ffffff; }
        .post { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #30363d; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .author-name { font-weight: bold; color: #f0f6fc; }
        .post-text { line-height: 1.6; white-space: pre-wrap; }
        .post-image { width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #30363d; }
        footer { margin-top: 50px; font-size: 0.8rem; color: #484f58; text-align: center; }

        #ios-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 320px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 12px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            z-index: 9999; direction: ltr;
        }
        .player-content { display: flex; align-items: center; gap: 12px; }
        .player-album-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .player-info { flex-grow: 1; overflow: hidden; color: white; }
        .player-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-sub { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); }
        #play-pause-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .player-progress-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-top: 10px; }
        #progress-bar { height: 100%; width: 0%; background: white; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <header><h1>Zaid & Friends</h1></header>
        <div id="dynamic-posts"><p>جاري التحميل...</p></div>
    </div>

    <footer> © 2026 from zaid </footer>

    <div id="ios-player">
        <div class="player-content">
            <img src="zaidpfp.jpeg" class="player-album-art" onerror="this.src='https://via.placeholder.com/45'">
            <div class="player-info">
                <div class="player-title">Zaid & Friends Beat</div>
                <div class="player-sub">Playing Now</div>
            </div>
            <button id="play-pause-btn">▶</button>
        </div>
        <div class="player-progress-container"><div id="progress-bar"></div></div>
    </div>

    <audio id="background-audio" loop><source src="beat.mp3" type="audio/mpeg"></audio>

    <script>
        async function fetchDynamicPosts() {
            const container = document.getElementById('dynamic-posts');
            try {
                const response = await fetch(`https://api.github.com/repos/z08id-coder/bio/contents/_posts`);
                const files = await response.json();
                container.innerHTML = '';
                for (const file of files) {
                    if (file.name.endsWith('.json')) {
                        const res = await fetch(file.download_url);
                        const post = await res.json();
                        container.innerHTML += `
                            <div class="post">
                                <div class="post-header">
                                    <img src="zaidpfp.jpeg" class="avatar">
                                    <span class="author-name">${post.author || 'Zaid'}</span>
                                </div>
                                <div class="post-text">${post.body}</div>
                                ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                            </div>`;
                    }
                }
            } catch (e) { container.innerText = "خطأ في التحميل"; }
        }
        fetchDynamicPosts();

        const audio = document.getElementById('background-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const bar = document.getElementById('progress-bar');

        function play() { if(audio.paused) { audio.play(); playBtn.innerText = "⏸"; } }
        ['click', 'scroll', 'touchstart'].forEach(e => window.addEventListener(e, play, {once:true}));
        
        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(audio.paused) { audio.play(); playBtn.innerText = "⏸"; }
            else { audio.pause(); playBtn.innerText = "▶"; }
        });

        audio.addEventListener('timeupdate', () => {
            bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
        });
    </script>
</body>
</html>
