<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaid | Posts</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        #posts-container {
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        .post-card {
            background: #161b22;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #30363d;
            transition: 0.3s;
        }
        .post-card:hover { border-color: #58a6ff; }
        .error-msg { color: #f85149; font-size: 0.9rem; }
        footer { margin-top: 50px; opacity: 0.5; font-size: 0.8rem; }
        a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Zaid</h1>

    <div id="posts-container">
        <p id="loading-text">جاري تحميل المنشورات...</p>
    </div>

    <footer>from zaid 2026 ©</footer>

    <script>
        async function fetchDynamicPosts() {
            const postsContainer = document.getElementById('posts-container');
            const loadingText = document.getElementById('loading-text');
            
            // معلومات المستودع تبعك
            const repoOwner = "z08id-coder";
            const repoName = "bio";
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/_posts`;

            try {
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    if (response.status === 403) {
                        throw new Error("وصلت للحد الأقصى من الطلبات (Rate Limit). جرب من شبكة ثانية أو انتظر قليلاً.");
                    }
                    throw new Error(`خطأ في السيرفر: ${response.status}`);
                }

                const files = await response.json();

                // التأكد أن البيانات مصفوفة (هذا حل الـ TypeError اللي ظهر عندك)
                if (Array.isArray(files)) {
                    const markdownFiles = files.filter(file => file.name.endsWith('.md'));

                    if (markdownFiles.length === 0) {
                        postsContainer.innerHTML = "<p>لا يوجد منشورات في مجلد _posts حالياً.</p>";
                        return;
                    }

                    postsContainer.innerHTML = ''; // تنظيف الحاوية

                    markdownFiles.forEach(file => {
                        const postName = file.name.replace('.md', '').replace(/-/g, ' ');
                        const postElement = document.createElement('div');
                        postElement.className = 'post-card';
                        postElement.innerHTML = `
                            <h3>${postName}</h3>
                            <a href="${file.html_url}" target="_blank">فتح المنشور ↗</a>
                        `;
                        postsContainer.appendChild(postElement);
                    });
                } else {
                    throw new Error("تنسيق البيانات غير صحيح.");
                }

            } catch (error) {
                console.error("Error:", error);
                postsContainer.innerHTML = `
                    <p class="error-msg">فشل تحميل المنشورات.</p>
                    <p style="font-size: 0.7rem; opacity: 0.6;">السبب: ${error.message}</p>
                `;
            }
        }

        // تشغيل الدالة
        fetchDynamicPosts();
    </script>
</body>
</html>
