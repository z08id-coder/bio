<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/jpeg" href="Dostoyevski.jpg">
    <link href="https://afeld.github.io/emoji-css/emoji.css" rel="stylesheet">
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KPM9RH2MP5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KPM9RH2MP5');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaid Note book</title>
    <style>
        img.emoji {
            height: 1em;
            width: 1em;
            margin: 0 .05em 0 .1em;
            vertical-align: -0.1em;
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background: linear-gradient(160deg, #020408 0%, #0a1628 50%, #0d1f3c 100%);
            min-height: 100vh;
            color: #cde4f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* تصميم مشغل الموسيقى - ستايل آيفون */
        #ios-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            background: rgba(30, 100, 180, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(30, 100, 180, 0.3);
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            z-index: 9999;
            direction: ltr;
        }

        .player-content { display: flex; align-items: center; gap: 12px; }
        .player-album-art { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .player-info { flex-grow: 1; overflow: hidden; }
        .player-title { font-weight: 600; font-size: 0.9rem; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-sub { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); }
        #play-pause-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .player-progress-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-top: 10px; position: relative; }
        #progress-bar { height: 100%; width: 0%; background: #60a5fa; border-radius: 2px; }

        .container { max-width: 500px; width: 100%; }

        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        header h1 { font-size: 1.8rem; color: #93c5fd; margin-bottom: 5px; }

        .post {
            background-color: rgba(10, 22, 40, 0.7);
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .post:hover { border-color: #60a5fa; }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1e3a5f;
            background-color: #050d18;
        }

        .author-info { display: flex; flex-direction: column; }
        .author-name { font-weight: bold; color: #eff6ff; font-size: 1rem; }

        .post-date {
            font-size: 0.75rem;
            color: #4a6fa0;
            display: none !important;
        }

        .post-text { line-height: 1.6; font-size: 1.05rem; color: #dbeafe; white-space: pre-wrap; }
        .post-image { width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #1e3a5f; }

        footer { margin-top: 50px; font-size: 0.8rem; color: #1e3a5f; }
        #loading-msg { text-align: center; color: #4a6fa0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Zaid room</h1>
        </header>
        <div id="dynamic-posts">
            <p id="loading-msg">جاري تحميل المنشورات وتصحيح التوقيت...</p>
        </div>
    </div>

    <footer> © 2026 from zaid </footer>

    <script>
        async function fetchDynamicPosts() {
            const dynamicContainer = document.getElementById('dynamic-posts');
            const apiUrl = `https://api.github.com/repos/z08id-coder/bio/contents/_posts`;

            try {
                const response = await fetch(apiUrl);
                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith(".md"));
                let postsData = [];

                for (const file of mdFiles) {
                    const postRes = await fetch(file.download_url);
                    const content = await postRes.text();
                    
                    const title = (content.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/))?.[1] || "صديق";
                    let dateStr = (content.match(/date:\s*(.*?)(\r?\n|$)/))?.[1] || "";
                    const avatar = (content.match(/avatar:\s*(.*?)(\r?\n|$)/))?.[1] || 'zaidpfp.jpeg';
                    const image = (content.match(/image:\s*(.*?)(\r?\n|$)/))?.[1] || null;
                    const body = content.split("---").pop().trim();

                    let finalDate;
                    if (!dateStr || dateStr.includes("{{now}}")) {
                        finalDate = new Date();
                    } else {
                        finalDate = new Date(dateStr);
                    }

                    postsData.push({
                        title: title.trim(),
                        date: finalDate,
                        dateDisplay: finalDate.toLocaleString('ar-EG', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
                        avatar: avatar.trim(),
                        image: image ? image.trim() : null,
                        body
                    });
                }

                postsData.sort((a, b) => b.date - a.date);

                dynamicContainer.innerHTML = ""; 
                postsData.forEach(post => {
                    const postHtml = `
                        <div class="post">
                            <div class="post-header">
                                <img src="${post.avatar}" class="avatar" onerror="this.src='zaidpfp.jpeg'">
                                <div class="author-info">
                                    <span class="author-name">${post.title}</span>
                                    <span class="post-date">${post.dateDisplay}</span>
                                </div>
                            </div>
                            <div class="post-text">${post.body}</div>
                            ${post.image ? `<img src="${post.image}" class="post-image">` : ""}
                        </div>
                    `;
                    dynamicContainer.innerHTML += postHtml;
                });

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading-msg').innerText = "فشل تحميل المنشورات.";
            }
        }
        fetchDynamicPosts();
    </script>

    <script>
        window.onload = function() {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        }
    </script>

    <script>
        const observer = new MutationObserver(() => {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        });
        observer.observe(document.body, { childList: true, subtree: true });
        window.onload = () => twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
    </script>

</body>
</html>
